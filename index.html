<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub Explorer · UI Redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f19;
  --card:#121826;
  --glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --accent:#6366f1;
  --accent2:#22d3ee;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at 20% 20%, #1e293b, #020617);
  color:var(--text);
}

.container{
  max-width:1100px;
  margin:auto;
  padding:2rem;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:2rem;
}

.logo{
  font-weight:800;
  font-size:1.5rem;
}

.badge{
  font-size:.7rem;
  padding:.3rem .7rem;
  border-radius:999px;
  background:var(--glass);
  border:1px solid var(--border);
}

.search-box{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1rem;
  display:flex;
  gap:.5rem;
  backdrop-filter:blur(12px);
}

.search-box input{
  flex:1;
  background:transparent;
  border:none;
  color:var(--text);
  font-size:1rem;
  outline:none;
}

.search-box button{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  padding:.6rem 1.2rem;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.profile-card{
  margin-top:2rem;
  display:flex;
  gap:1.5rem;
  padding:1.5rem;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  backdrop-filter:blur(10px);
}

.profile-card img{
  width:90px;
  border-radius:50%;
}

.profile-info h2{
  font-size:1.4rem;
}

.profile-info p{
  color:var(--muted);
  font-size:.9rem;
}

.stats{
  display:flex;
  gap:1rem;
  margin-top:1rem;
}

.stat{
  background:var(--card);
  padding:.6rem 1rem;
  border-radius:10px;
  text-align:center;
}

.stat span{
  display:block;
  font-weight:700;
}

.repos{
  margin-top:2rem;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1rem;
}

.repo{
  padding:1rem;
  border-radius:16px;
  background:var(--glass);
  border:1px solid var(--border);
  transition:.2s;
}

.repo:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

.repo h4{
  font-size:.95rem;
  margin-bottom:.3rem;
}

.repo p{
  font-size:.8rem;
  color:var(--muted);
}

</style>
</head>

<body>
<div class="container">

<header>
  <div class="logo">⚡ GitHub Explorer</div>
  <div>
    <span class="badge" id="apiBadge">API</span>
    <span class="badge" id="tokenBadge">Token</span>
  </div>
</header>

<div class="search-box">
  <input id="usernameInput" placeholder="Buscar usuario...">
  <button onclick="buscarUsuario()">Buscar</button>
</div>

<div id="statusBar"></div>
<div id="results"></div>

</div>

<script>
const API_BASE = "rust-github-api-emprowler.up.railway.app";

const results = document.getElementById('results');
const statusBar = document.getElementById('statusBar');

async function buscarUsuario(){
  const username = document.getElementById('usernameInput').value.trim();
  if(!username) return;

  results.innerHTML="";

  try{
    const [u,r] = await Promise.all([
      fetch(`${API_BASE}/api/v1/github/users/${username}`),
      fetch(`${API_BASE}/api/v1/github/users/${username}/repos`)
    ]);

    const user = await u.json();
    const repos = await r.json();

    renderUser(user.data);
    renderRepos(repos.data.repositorios);

  }catch(e){
    statusBar.textContent="Error";
  }
}

function renderUser(p){
  results.innerHTML += `
  <div class="profile-card">
    <img src="${p.perfil.avatar_url}">
    <div class="profile-info">
      <h2>${p.perfil.name || p.perfil.login}</h2>
      <p>${p.perfil.bio || ''}</p>
      <div class="stats">
        <div class="stat"><span>${p.perfil.public_repos}</span>Repos</div>
        <div class="stat"><span>${p.perfil.followers}</span>Followers</div>
        <div class="stat"><span>${p.perfil.following}</span>Following</div>
      </div>
    </div>
  </div>`;
}

function renderRepos(repos){
  let html = '<div class="repos">';
  repos.forEach(r=>{
    html += `
    <div class="repo">
      <h4>${r.name}</h4>
      <p>${r.description || 'Sin descripción'}</p>
      <p>⭐ ${r.stargazers_count} | 🍴 ${r.forks_count}</p>
    </div>`;
  });
  html += '</div>';
  results.innerHTML += html;
}
</script>

</body>
</html>
