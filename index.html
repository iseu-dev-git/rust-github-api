
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rust GitHub · Cyber UI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#020617;
  --neon:#00f0ff;
  --neon2:#8b5cf6;
  --border:rgba(0,240,255,.2);
  --text:#e2e8f0;
  --muted:#64748b;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:#020617;
  color:var(--text);
  overflow-x:hidden;
}

/* background glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 20%, rgba(0,240,255,.15), transparent 40%),
             radial-gradient(circle at 80% 80%, rgba(139,92,246,.15), transparent 40%);
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  max-width:1100px;
  margin:auto;
  padding:2rem;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:2rem;
}

.logo{
  font-family:'Orbitron',sans-serif;
  font-weight:800;
  font-size:1.6rem;
  color:var(--neon);
  text-shadow:0 0 10px var(--neon);
}

.badge{
  font-size:.7rem;
  padding:.3rem .7rem;
  border-radius:999px;
  border:1px solid var(--border);
  color:var(--neon);
  box-shadow:0 0 6px var(--neon);
}

.search-box{
  border:1px solid var(--border);
  border-radius:14px;
  padding:1rem;
  display:flex;
  gap:.5rem;
  background:rgba(2,6,23,.7);
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(0,240,255,.15);
}

.search-box input{
  flex:1;
  background:transparent;
  border:none;
  color:var(--text);
  outline:none;
  font-family:'Orbitron',sans-serif;
}

.search-box button{
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  border:none;
  padding:.6rem 1.3rem;
  border-radius:10px;
  color:#000;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 0 15px var(--neon);
}

.profile-card{
  margin-top:2rem;
  display:flex;
  gap:1.5rem;
  padding:1.5rem;
  border:1px solid var(--border);
  border-radius:18px;
  background:rgba(2,6,23,.7);
  box-shadow:0 0 25px rgba(0,240,255,.15);
}

.profile-card img{
  width:90px;
  border-radius:50%;
  border:2px solid var(--neon);
  box-shadow:0 0 10px var(--neon);
}

.profile-info h2{
  font-family:'Orbitron';
  color:var(--neon);
}

.profile-info p{
  color:var(--muted);
}

.stats{
  display:flex;
  gap:1rem;
  margin-top:1rem;
}

.stat{
  border:1px solid var(--border);
  padding:.6rem 1rem;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,240,255,.1);
}

.stat span{
  display:block;
  font-weight:700;
  color:var(--neon);
}

.repos{
  margin-top:2rem;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1rem;
}

.repo{
  padding:1rem;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(2,6,23,.7);
  transition:.25s;
  position:relative;
  overflow:hidden;
}

.repo::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(0,240,255,.15), transparent);
  opacity:0;
  transition:.3s;
}

.repo:hover::before{opacity:1}

.repo:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 0 20px var(--neon);
}

.repo h4{
  color:var(--neon);
  font-family:'Orbitron';
}

.repo p{
  font-size:.8rem;
  color:var(--muted);
}

</style>
</head>

<body>
<div class="container">

<header>
  <div class="logo">⚡ EMPROWLER CYBER</div>
  <div>
    <span class="badge" id="apiBadge">API</span>
    <span class="badge" id="tokenBadge">TOKEN</span>
  </div>
</header>

<div class="search-box">
  <input id="usernameInput" placeholder="Buscar usuario...">
  <button onclick="buscarUsuario()">SCAN</button>
</div>

<div id="statusBar"></div>
<div id="results"></div>

</div>

<script>
const API_BASE = "rust-github-api-emprowler.up.railway.app";

const results = document.getElementById('results');
const statusBar = document.getElementById('statusBar');

async function buscarUsuario(){
  const username = document.getElementById('usernameInput').value.trim();
  if(!username) return;

  results.innerHTML="";

  try{
    const [u,r] = await Promise.all([
      fetch(`${API_BASE}/api/v1/github/users/${username}`),
      fetch(`${API_BASE}/api/v1/github/users/${username}/repos`)
    ]);

    const user = await u.json();
    const repos = await r.json();

    renderUser(user.data);
    renderRepos(repos.data.repositorios);

  }catch(e){
    statusBar.textContent="Error";
  }
}

function renderUser(p){
  results.innerHTML += `
  <div class="profile-card">
    <img src="${p.perfil.avatar_url}">
    <div class="profile-info">
      <h2>${p.perfil.name || p.perfil.login}</h2>
      <p>${p.perfil.bio || ''}</p>
      <div class="stats">
        <div class="stat"><span>${p.perfil.public_repos}</span>Repos</div>
        <div class="stat"><span>${p.perfil.followers}</span>Followers</div>
        <div class="stat"><span>${p.perfil.following}</span>Following</div>
      </div>
    </div>
  </div>`;
}

function renderRepos(repos){
  let html = '<div class="repos">';
  repos.forEach(r=>{
    html += `
    <div class="repo">
      <h4>${r.name}</h4>
      <p>${r.description || 'Sin descripción'}</p>
      <p>⭐ ${r.stargazers_count} | 🍴 ${r.forks_count}</p>
    </div>`;
  });
  html += '</div>';
  results.innerHTML += html;
}
</script>

</body>
</html>
