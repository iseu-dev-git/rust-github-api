
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Explorer · Rust API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ===== VARIABLES ===== */
    :root {
      --bg:         #050709;
      --surface:    #0c0e14;
      --surface2:   #111520;
      --border:     #1a1f2e;
      --border2:    #242b3d;
      --cyan:       #22d3ee;
      --purple:     #a855f7;
      --orange:     #f97316;
      --green:      #34d399;
      --red:        #f87171;
      --yellow:     #fbbf24;
      --text:       #e2e8f0;
      --text2:      #94a3b8;
      --muted:      #475569;
      --glow-cyan:  rgba(34,211,238,.12);
      --glow-purple:rgba(168,85,247,.12);
      --glow-orange:rgba(249,115,22,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg-layer {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* Subtle grid */
    .bg-layer::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(34,211,238,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,211,238,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Radial glow orbs */
    .bg-layer::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(168,85,247,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 80%, rgba(34,211,238,.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(249,115,22,.04) 0%, transparent 60%);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .35;
      animation: drift 20s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(168,85,247,.3), transparent 70%);
      top: -150px; left: -100px;
      animation-duration: 25s;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(34,211,238,.25), transparent 70%);
      bottom: -100px; right: -80px;
      animation-duration: 30s;
      animation-delay: -10s;
    }

    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(249,115,22,.2), transparent 70%);
      top: 40%; left: 50%;
      animation-duration: 20s;
      animation-delay: -5s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.05); }
      100% { transform: translate(-20px, 30px) scale(.95); }
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* ===== HEADER ===== */
    header {
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-glass {
      background: rgba(5,7,9,.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 1.1rem;
      box-shadow: 0 0 20px var(--glow-cyan);
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -.01em;
      color: var(--text);
    }

    .logo-text .accent { color: var(--cyan); }

    .header-badges {
      display: flex;
      gap: .5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      font-family: 'Space Mono', monospace;
      font-size: .62rem;
      padding: .3rem .7rem;
      border-radius: 20px;
      border: 1px solid var(--border2);
      color: var(--muted);
      letter-spacing: .06em;
      background: var(--surface);
      transition: all .3s;
    }

    .badge.online {
      border-color: var(--green);
      color: var(--green);
      background: rgba(52,211,153,.08);
      box-shadow: 0 0 12px rgba(52,211,153,.15);
    }

    .badge.online::before { content: '◉ '; }

    .badge.offline {
      border-color: var(--red);
      color: var(--red);
      background: rgba(248,113,113,.08);
    }

    .badge.offline::before { content: '○ '; }

    .badge.token-ok {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(34,211,238,.08);
    }

    .badge.token-none {
      border-color: var(--orange);
      color: var(--orange);
      background: rgba(249,115,22,.08);
    }

    /* ===== HERO / SEARCH ===== */
    .hero {
      padding: 5rem 0 3.5rem;
      text-align: center;
    }

    .hero-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      color: var(--cyan);
      letter-spacing: .2em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      opacity: .8;
    }

    .hero-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -.03em;
      margin-bottom: 1rem;
    }

    .hero-title .grad-cyan {
      background: linear-gradient(135deg, var(--cyan), #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-title .grad-purple {
      background: linear-gradient(135deg, var(--purple), #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: .95rem;
      color: var(--text2);
      max-width: 480px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    /* ===== SEARCH BOX ===== */
    .search-wrap {
      max-width: 600px;
      margin: 0 auto;
    }

    .search-box {
      display: flex;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }

    .search-box:focus-within {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px var(--glow-cyan), 0 4px 24px rgba(0,0,0,.4);
    }

    .search-icon {
      display: flex;
      align-items: center;
      padding: 0 1rem 0 1.25rem;
      color: var(--muted);
      font-size: 1rem;
      flex-shrink: 0;
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1rem .5rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: .9rem;
      outline: none;
      min-width: 0;
    }

    .search-input::placeholder { color: var(--muted); }

    .search-btn {
      background: linear-gradient(135deg, var(--cyan), #0ea5e9);
      color: #000;
      border: none;
      padding: .85rem 1.75rem;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: .78rem;
      cursor: pointer;
      letter-spacing: .08em;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-btn:hover {
      opacity: .92;
      box-shadow: 0 0 20px var(--glow-cyan);
    }

    .search-btn:active { transform: scale(.97); }
    .search-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ===== STATUS BAR ===== */
    #statusBar {
      margin-top: .9rem;
      font-size: .75rem;
      color: var(--muted);
      min-height: 1.2rem;
      font-family: 'Space Mono', monospace;
      text-align: center;
      transition: color .3s;
    }

    #statusBar.error   { color: var(--red); }
    #statusBar.loading { color: var(--cyan); }
    #statusBar.success { color: var(--green); }

    /* ===== RESULTS ===== */
    #results { padding-bottom: 5rem; }

    /* ===== PROFILE CARD ===== */
    .profile-card {
      background: rgba(12,14,20,.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 2.25rem;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--cyan), var(--orange));
    }

    .profile-card-inner {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2rem;
      align-items: start;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      border: 2px solid transparent;
      background-clip: padding-box;
      object-fit: cover;
      display: block;
      box-shadow: 0 0 0 2px var(--purple), 0 0 24px var(--glow-purple);
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      z-index: -1;
      animation: spin-slow 8s linear infinite;
      opacity: .6;
    }

    @keyframes spin-slow { to { transform: rotate(360deg); } }

    .profile-info {
      min-width: 0;
    }

    .profile-name {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.2;
      margin-bottom: .2rem;
    }

    .profile-login {
      font-family: 'Space Mono', monospace;
      color: var(--cyan);
      font-size: .82rem;
      margin-bottom: .75rem;
    }

    .profile-bio {
      color: var(--text2);
      font-size: .88rem;
      line-height: 1.65;
      margin-bottom: 1rem;
      max-width: 520px;
    }

    .profile-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem .9rem;
      font-size: .75rem;
      color: var(--text2);
    }

    .profile-meta-item {
      display: flex;
      align-items: center;
      gap: .35rem;
    }

    .profile-meta-item a {
      color: var(--cyan);
      text-decoration: none;
    }

    .profile-meta-item a:hover { text-decoration: underline; }

    /* ===== STATS ROW ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: .75rem;
      margin-top: 2rem;
    }

    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem .75rem;
      text-align: center;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      cursor: default;
    }

    .stat-box:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px var(--glow-cyan);
    }

    .stat-icon {
      font-size: 1.1rem;
      margin-bottom: .3rem;
      display: block;
    }

    .stat-val {
      font-family: 'Space Mono', monospace;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--cyan);
      display: block;
      line-height: 1;
      margin-bottom: .3rem;
    }

    .stat-lbl {
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* ===== SECTION HEADER ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
      padding-bottom: .9rem;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px; height: 16px;
      background: linear-gradient(to bottom, var(--cyan), var(--purple));
      border-radius: 2px;
    }

    .section-count {
      font-family: 'Space Mono', monospace;
      font-size: .68rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: .2rem .6rem;
      border-radius: 20px;
    }

    /* ===== REPO GRID ===== */
    .repos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 1rem;
    }

    .repo-card {
      background: rgba(12,14,20,.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.35rem;
      display: flex;
      flex-direction: column;
      gap: .65rem;
      transition: border-color .25s, transform .25s, box-shadow .25s;
      animation: fadeUp .5s cubic-bezier(.16,1,.3,1) both;
      text-decoration: none;
      color: inherit;
      position: relative;
      overflow: hidden;
    }

    .repo-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--glow-cyan), transparent 60%);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    .repo-card:hover {
      border-color: var(--cyan);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(34,211,238,.1);
    }

    .repo-card:hover::after { opacity: 1; }

    .repo-name {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: .85rem;
      color: var(--cyan);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .repo-name-icon { opacity: .6; font-size: .8rem; }

    .repo-desc {
      font-size: .8rem;
      color: var(--text2);
      line-height: 1.55;
      flex: 1;
    }

    .repo-footer {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .7rem;
      color: var(--muted);
      flex-wrap: wrap;
      padding-top: .5rem;
      border-top: 1px solid var(--border);
    }

    .repo-stat {
      display: flex;
      align-items: center;
      gap: .25rem;
    }

    .lang-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tag {
      font-size: .58rem;
      padding: .15rem .5rem;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: .04em;
    }

    .tag.fork     { border-color: var(--purple); color: var(--purple); background: rgba(168,85,247,.08); }
    .tag.archived { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,.08); }

    /* ===== SKELETON LOADER ===== */
    .skeleton-wrap {
      animation: fadeUp .3s ease both;
    }

    .skeleton-profile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.25rem;
      margin-bottom: 2rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2rem;
      align-items: start;
    }

    .sk {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border2) 50%, var(--surface) 75%);
      background-size: 300% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
    }

    .sk-circle { border-radius: 50%; }

    .skeleton-repos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 1rem;
    }

    .skeleton-repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.35rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    /* ===== ERROR STATE ===== */
    .error-card {
      background: rgba(248,113,113,.05);
      border: 1px solid rgba(248,113,113,.2);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      animation: fadeUp .4s ease both;
    }

    .error-icon { font-size: 2.5rem; margin-bottom: 1rem; }

    .error-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--red);
      margin-bottom: .5rem;
    }

    .error-msg {
      font-size: .83rem;
      color: var(--text2);
      line-height: 1.6;
    }

    .error-msg code {
      font-family: 'Space Mono', monospace;
      color: var(--cyan);
      background: var(--surface2);
      padding: .1rem .4rem;
      border-radius: 4px;
      font-size: .75rem;
    }

    /* ===== FOOTER ===== */
    .page-footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
      padding: 1.5rem 0;
      text-align: center;
      font-size: .7rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .page-footer span { color: var(--cyan); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(34,211,238,.2);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .4rem;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .profile-card-inner { grid-template-columns: 1fr; }
      .avatar { width: 72px; height: 72px; }
      .hero { padding: 3rem 0 2.5rem; }
      .hero-title { font-size: 1.9rem; }
      .search-btn { padding: .85rem 1.2rem; font-size: .72rem; }
      .repos-grid { grid-template-columns: 1fr; }
      .skeleton-repos { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<header>
  <div class="header-glass">
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">⚡</div>
          <span class="logo-text">GitHub<span class="accent">Explorer</span></span>
        </div>
        <div class="header-badges">
          <span class="badge" id="apiBadge">checking api…</span>
          <span class="badge" id="tokenBadge">token: –</span>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="container">

    <section class="hero">
      <div class="hero-eyebrow">// powered by rust · actix-web · github graphql</div>
      <h1 class="hero-title">
        Explore <span class="grad-cyan">GitHub</span><br>
        <span class="grad-purple">Profiles</span> &amp; Repos
      </h1>
      <p class="hero-sub">
        Query any GitHub user's public profile, repositories, and contribution stats — served by a blazing-fast Rust API.
      </p>

      <div class="search-wrap">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input
            class="search-input"
            id="usernameInput"
            type="text"
            placeholder="Enter a GitHub username…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="search-btn" id="searchBtn" onclick="buscarUsuario()">SEARCH →</button>
        </div>
        <div id="statusBar"></div>
      </div>
    </section>

    <section id="results"></section>

  </div>
</main>

<footer class="page-footer">
  <div class="container">
    Built with <span>Rust</span> · Actix-web · GitHub GraphQL API
  </div>
</footer>

<script>
  // ============================================================
  //  API base URL — Railway deployment
  // ============================================================
  const API_BASE = "https://rust-github-api-production-10bc.up.railway.app";
  // ============================================================

  const statusBar  = document.getElementById('statusBar');
  const results    = document.getElementById('results');
  const searchBtn  = document.getElementById('searchBtn');
  const apiBadge   = document.getElementById('apiBadge');
  const tokenBadge = document.getElementById('tokenBadge');

  // Language color map
  const LANG_COLORS = {
    JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
    Rust: '#dea584', Go: '#00ADD8', Java: '#b07219', 'C++': '#f34b7d',
    'C#': '#178600', C: '#555555', CSS: '#563d7c', HTML: '#e34c26',
    Ruby: '#701516', Swift: '#fa7343', Kotlin: '#A97BFF', PHP: '#4F5D95',
    Shell: '#89e051', Dart: '#00B4AB', Scala: '#c22d40', Haskell: '#5e5086',
    Elixir: '#6e4a7e', Lua: '#000080', R: '#198CE7', Vue: '#41b883',
  };

  // ── API status check ──────────────────────────────────────────
  async function checkApiStatus() {
    try {
      const res  = await fetch(`${API_BASE}/api/v1/github/status`, { signal: AbortSignal.timeout(8000) });
      const json = await res.json();
      const hasToken = json.data?.token_configurado;

      apiBadge.textContent = 'api: online';
      apiBadge.className   = 'badge online';

      tokenBadge.textContent = hasToken ? 'token: active' : 'token: none';
      tokenBadge.className   = hasToken ? 'badge token-ok' : 'badge token-none';
    } catch {
      apiBadge.textContent = 'api: offline';
      apiBadge.className   = 'badge offline';
    }
  }

  // ── Skeleton loader ───────────────────────────────────────────
  function showSkeleton() {
    results.innerHTML = `
      <div class="skeleton-wrap">
        <div class="skeleton-profile">
          <div class="sk sk-circle" style="width:96px;height:96px;flex-shrink:0"></div>
          <div style="display:flex;flex-direction:column;gap:.75rem;padding-top:.25rem">
            <div class="sk" style="height:22px;width:55%"></div>
            <div class="sk" style="height:14px;width:30%"></div>
            <div class="sk" style="height:12px;width:80%"></div>
            <div class="sk" style="height:12px;width:65%"></div>
            <div style="display:flex;gap:.5rem;margin-top:.25rem">
              <div class="sk" style="height:12px;width:80px"></div>
              <div class="sk" style="height:12px;width:100px"></div>
            </div>
          </div>
        </div>
        <div class="skeleton-repos">
          ${Array.from({length: 6}, () => `
            <div class="skeleton-repo-card">
              <div class="sk" style="height:14px;width:60%"></div>
              <div class="sk" style="height:11px;width:90%"></div>
              <div class="sk" style="height:11px;width:75%"></div>
              <div style="display:flex;gap:.5rem;margin-top:.25rem">
                <div class="sk" style="height:10px;width:50px"></div>
                <div class="sk" style="height:10px;width:40px"></div>
                <div class="sk" style="height:10px;width:40px"></div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // ── Search handler ────────────────────────────────────────────
  async function buscarUsuario() {
    const username = document.getElementById('usernameInput').value.trim();
    if (!username) return;

    setLoading(true);
    showSkeleton();
    setStatus('Fetching profile…', 'loading');

    try {
      const [userRes, reposRes] = await Promise.all([
        fetch(`${API_BASE}/api/v1/github/users/${username}`),
        fetch(`${API_BASE}/api/v1/github/users/${username}/repos`)
      ]);

      if (!userRes.ok) {
        const code = userRes.status;
        throw new Error(code === 404
          ? `User "${username}" not found on GitHub`
          : `API error ${code} — check that the API is running`);
      }

      const userData  = await userRes.json();
      const reposData = reposRes.ok ? await reposRes.json() : null;

      results.innerHTML = '';
      renderProfile(userData.data, username);
      if (reposData?.data) renderRepos(reposData.data);

      const repoCount = userData.data?.perfil?.public_repos ?? 0;
      setStatus(`✓ ${repoCount} public repos · loaded at ${new Date().toLocaleTimeString()}`, 'success');

    } catch (err) {
      setStatus(err.message, 'error');
      results.innerHTML = `
        <div class="error-card">
          <div class="error-icon">🛰️</div>
          <div class="error-title">Could not reach the API</div>
          <div class="error-msg">
            ${esc(err.message)}<br><br>
            Make sure <code>API_BASE</code> points to your Railway deployment
            and the service is running.
          </div>
        </div>`;
    } finally {
      setLoading(false);
    }
  }

  // ── Render profile card ───────────────────────────────────────
  function renderProfile(data, username) {
    const p = data?.perfil;
    if (!p) return;

    const statItems = [
      { icon: '📦', val: p.public_repos,  lbl: 'Public Repos' },
      { icon: '👥', val: p.followers,     lbl: 'Followers'    },
      { icon: '➡️', val: p.following,     lbl: 'Following'    },
      ...(p.starred_repos  != null ? [{ icon: '⭐', val: p.starred_repos,  lbl: 'Stars Given'   }] : []),
      ...(p.total_commits  != null ? [{ icon: '💾', val: p.total_commits,  lbl: 'Commits'       }] : []),
      ...(p.total_prs      != null ? [{ icon: '🔀', val: p.total_prs,      lbl: 'Pull Requests' }] : []),
      ...(p.total_issues   != null ? [{ icon: '🐛', val: p.total_issues,   lbl: 'Issues'        }] : []),
      ...(p.private_repos  != null ? [{ icon: '🔒', val: p.private_repos,  lbl: 'Private Repos' }] : []),
    ];

    results.innerHTML = `
      <div class="profile-card">
        <div class="profile-card-inner">
          <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <img class="avatar"
              src="${p.avatar_url}"
              alt="${esc(p.login)}"
              onerror="this.src='https://github.com/identicons/${p.login}.png'"
            />
          </div>
          <div class="profile-info">
            <div class="profile-name">${esc(p.name || p.login)}</div>
            <div class="profile-login">@${esc(p.login)}</div>
            ${p.bio ? `<div class="profile-bio">${esc(p.bio)}</div>` : ''}
            <div class="profile-meta">
              ${p.location ? `<span class="profile-meta-item">📍 ${esc(p.location)}</span>` : ''}
              ${p.company  ? `<span class="profile-meta-item">🏢 ${esc(p.company)}</span>`  : ''}
              ${p.email    ? `<span class="profile-meta-item">✉️ ${esc(p.email)}</span>`    : ''}
              <span class="profile-meta-item">🔗 <a href="${p.html_url}" target="_blank" rel="noopener">${esc(p.html_url)}</a></span>
            </div>
          </div>
        </div>
        <div class="stats-row">
          ${statItems.map(s => `
            <div class="stat-box">
              <span class="stat-icon">${s.icon}</span>
              <span class="stat-val">${fmt(s.val)}</span>
              <span class="stat-lbl">${s.lbl}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // ── Render repositories ───────────────────────────────────────
  function renderRepos(data) {
    const repos = data?.repositorios || [];
    if (!repos.length) return;

    const cards = repos.map((r, i) => {
      const langColor = r.language_color || LANG_COLORS[r.language] || '#94a3b8';
      return `
        <a class="repo-card" href="${r.html_url}" target="_blank" rel="noopener"
           style="animation-delay:${Math.min(i * 0.045, 1)}s">
          <div class="repo-name">
            <span class="repo-name-icon">📁</span>
            ${esc(r.name)}
          </div>
          <div class="repo-desc">${
            r.description
              ? esc(r.description)
              : '<em style="color:var(--muted);font-style:italic">No description</em>'
          }</div>
          <div class="repo-footer">
            ${r.language ? `
              <span class="repo-stat">
                <span class="lang-dot" style="background:${langColor}"></span>
                ${esc(r.language)}
              </span>` : ''}
            <span class="repo-stat">⭐ ${fmt(r.stargazers_count)}</span>
            <span class="repo-stat">🍴 ${fmt(r.forks_count)}</span>
            ${r.open_issues_count > 0 ? `<span class="repo-stat">🐛 ${r.open_issues_count}</span>` : ''}
            ${r.is_fork     ? '<span class="tag fork">fork</span>'         : ''}
            ${r.is_archived ? '<span class="tag archived">archived</span>' : ''}
            ${r.license     ? `<span class="tag">${esc(r.license)}</span>` : ''}
          </div>
        </a>`;
    }).join('');

    results.insertAdjacentHTML('beforeend', `
      <div class="section-header">
        <span class="section-title">Repositories</span>
        <span class="section-count">${repos.length} repos</span>
      </div>
      <div class="repos-grid">${cards}</div>
    `);
  }

  // ── Helpers ───────────────────────────────────────────────────
  function fmt(n) {
    if (n == null) return '–';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'k';
    return n;
  }

  function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  function setLoading(on) {
    searchBtn.disabled = on;
    searchBtn.innerHTML = on
      ? '<span class="spinner"></span>Loading…'
      : 'SEARCH →';
  }

  function setStatus(msg, type = '') {
    statusBar.textContent = msg;
    statusBar.className   = type;
  }

  // ── Keyboard shortcut ─────────────────────────────────────────
  document.getElementById('usernameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscarUsuario();
  });

  // ── Init ──────────────────────────────────────────────────────
  checkApiStatus();
</script>
</body>
</html>
